<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ferreteria Ukra Gallery — Herramientas y Construcción</title>
<meta name="description" content="Galería de herramientas, materiales de construcción y productos de ferretería. Encuentra lo que necesitas para tu proyecto.">
 <meta name="google-site-verification" content="Wy5ABweYBaVAoJHaRo6mCg7Psrp27hQKk1cP8JJ_Zwo" />
<meta property="og:title" content="Ferreteria Ukra Gallery">
<meta property="og:description" content="Herramientas, construcción y ferretería en un solo lugar.">
<meta property="og:url" content="https://ukrabot.github.io/ferreteriaukra-gallery/">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: system-ui, sans-serif; background: #f4f4f4; color: #222; }

  header {
    background: #cc2200;
    color: white;
    padding: 2rem 1.5rem 1.5rem;
    text-align: center;
  }
  header h1 { font-size: 1.8rem; font-weight: 800; margin-bottom: .4rem; }
  header p  { font-size: 1rem; opacity: .85; }
  header a  { color: #ffe066; text-decoration: none; font-size: .9rem; font-weight: 600; }

  .search-bar {
    max-width: 600px;
    margin: 1.5rem auto 0;
    display: flex;
    gap: .5rem;
  }
  .search-bar input {
    flex: 1;
    padding: .7rem 1rem;
    border: none;
    border-radius: 8px;
    font-size: 1rem;
  }
  .search-bar input:focus { outline: 2px solid #ffe066; }

  .stats {
    text-align: center;
    padding: .8rem;
    font-size: .85rem;
    color: #888;
  }

  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
    gap: 1.2rem;
    max-width: 1200px;
    margin: 0 auto;
    padding: 1rem 1rem 3rem;
  }

  .card {
    background: white;
    border-radius: 12px;
    overflow: hidden;
    box-shadow: 0 2px 10px rgba(0,0,0,.08);
    transition: transform .2s, box-shadow .2s;
    cursor: pointer;
    text-decoration: none;
    color: inherit;
    display: flex;
    flex-direction: column;
  }
  .card:hover {
    transform: translateY(-4px);
    box-shadow: 0 8px 24px rgba(0,0,0,.14);
  }
  .card img {
    width: 100%;
    height: 200px;
    object-fit: cover;
    display: block;
    background: #eee;
  }
  .card-body { padding: 1rem; flex: 1; display: flex; flex-direction: column; }
  .card-body h3 {
    font-size: .95rem;
    font-weight: 700;
    color: #111;
    margin-bottom: .4rem;
    line-height: 1.35;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }
  .card-body p {
    font-size: .82rem;
    color: #666;
    line-height: 1.5;
    flex: 1;
    display: -webkit-box;
    -webkit-line-clamp: 3;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }
  .card-footer {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-top: .8rem;
    padding-top: .6rem;
    border-top: 1px solid #f0f0f0;
  }
  .tags-mini { display: flex; flex-wrap: wrap; gap: 4px; }
  .tag {
    background: #fff3e0;
    color: #cc2200;
    font-size: .72rem;
    padding: 2px 8px;
    border-radius: 20px;
    font-weight: 600;
  }
  .date { font-size: .75rem; color: #bbb; white-space: nowrap; }

  .empty {
    text-align: center;
    padding: 4rem 1rem;
    color: #999;
    grid-column: 1/-1;
  }
  .empty p { font-size: 1.1rem; margin-bottom: .5rem; }

  #loading {
    text-align: center;
    padding: 3rem;
    color: #aaa;
    font-size: 1rem;
  }

  footer {
    text-align: center;
    padding: 2rem;
    color: #aaa;
    font-size: .85rem;
    border-top: 1px solid #e0e0e0;
    background: white;
  }
  footer a { color: #cc2200; text-decoration: none; font-weight: 600; }
</style>
</head>
<body>

<header>
  <h1>🔧 Ferreteria Ukra Gallery</h1>
  <p>Herramientas, construcción y materiales para tu proyecto</p>
  <div class="search-bar">
    <input type="search" id="search" placeholder="Buscar herramientas, materiales..." oninput="filterCards()">
  </div>
  <br>
  <a href="https://www.ferreteriaukra.cl/blog/" target="_blank">← Ver Blog Ferreteria Ukra</a>
</header>

<div class="stats" id="stats">Cargando artículos...</div>

<div class="grid" id="grid">
  <div id="loading">⏳ Cargando galería...</div>
</div>

<footer>
  <p>
    <a href="https://www.ferreteriaukra.cl/" target="_blank">Ferreteria Ukra</a>
    &nbsp;·&nbsp;
    <a href="https://www.ferreteriaukra.cl/blog/" target="_blank">Blog</a>
  </p>
</footer>

<script>
const DATA_URL = 'https://raw.githubusercontent.com/ukrabot/ferreteriaukra-gallery/main/data.json';
const BASE_IMG = 'https://raw.githubusercontent.com/ukrabot/ferreteriaukra-gallery/main/';

let allItems = [];

async function loadGallery() {
  try {
    const res  = await fetch(DATA_URL + '?t=' + Date.now());
    const data = await res.json();
    allItems   = data;
    renderCards(allItems);
    document.getElementById('stats').textContent =
      allItems.length + ' artículo' + (allItems.length !== 1 ? 's' : '') + ' en la galería';
  } catch (e) {
    document.getElementById('loading').innerHTML =
      '<div class="empty"><p>⚠️ Error cargando la galería</p><small>' + e.message + '</small></div>';
  }
}

function renderCards(items) {
  const grid = document.getElementById('grid');
  if (!items.length) {
    grid.innerHTML = '<div class="empty"><p>🔍 No se encontraron resultados</p><small>Intenta con otra búsqueda</small></div>';
    return;
  }

  grid.innerHTML = items.map(item => {
    const imgSrc   = BASE_IMG + (item.image || (item.images && item.images[0]) || '');
    const tags     = (item.tags || []).slice(0, 3).map(t =>
      `<span class="tag">#${t}</span>`).join('');
    const fecha    = item.date || '';
    const desc     = item.description || '';
    const pageHref = item.page || item.url || '#';

    return `
      <a class="card" href="${pageHref}" target="_blank" rel="noopener">
        <img src="${imgSrc}" alt="${item.title}" loading="lazy"
             onerror="this.src='https://picsum.photos/seed/${Math.abs(hashCode(item.title))%1000}/400/300'">
        <div class="card-body">
          <h3>${item.title}</h3>
          <p>${desc}</p>
          <div class="card-footer">
            <div class="tags-mini">${tags}</div>
            <span class="date">${fecha}</span>
          </div>
        </div>
      </a>`;
  }).join('');
}

function filterCards() {
  const q = document.getElementById('search').value.toLowerCase().trim();
  if (!q) {
    renderCards(allItems);
    document.getElementById('stats').textContent =
      allItems.length + ' artículo' + (allItems.length !== 1 ? 's' : '') + ' en la galería';
    return;
  }
  const filtered = allItems.filter(item =>
    (item.title       || '').toLowerCase().includes(q) ||
    (item.description || '').toLowerCase().includes(q) ||
    (item.tags        || []).some(t => t.toLowerCase().includes(q))
  );
  renderCards(filtered);
  document.getElementById('stats').textContent =
    filtered.length + ' resultado' + (filtered.length !== 1 ? 's' : '') + ' para "' + q + '"';
}

function hashCode(str) {
  let h = 0;
  for (let i = 0; i < str.length; i++) {
    h = Math.imul(31, h) + str.charCodeAt(i) | 0;
  }
  return h;
}

loadGallery();
</script>
</body>
</html>
